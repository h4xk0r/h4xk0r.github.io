<div id="utterances-container"></div>

<script>
    // 🕵️‍♂️ 全方位精确探测当前网页到底是黑是白
    function isDarkMode() {
        const html = document.documentElement;
        const body = document.body;

        // 1. 优先检查是否有任何地方显式标记了 dark（精准捕获你日志中的 data-theme="dark"）
        if (html.getAttribute("data-theme") === "dark" || html.classList.contains("dark") ||
            body.getAttribute("data-theme") === "dark" || body.classList.contains("dark")) {
            return true;
        }
        // 2. 检查是否有任何地方显式标记了 light
        if (html.getAttribute("data-theme") === "light" || html.classList.contains("light") ||
            body.getAttribute("data-theme") === "light" || body.classList.contains("light")) {
            return false;
        }
        // 3. 兜底检查本地缓存
        const prefTheme = localStorage.getItem("pref-theme");
        if (prefTheme) {
            return prefTheme === "dark";
        }
        // 4. 最终系统偏好兜底
        return window.matchMedia('(prefers-color-scheme: dark)').matches;
    }

    function getTargetTheme() {
        return isDarkMode() ? "github-dark" : "github-light";
    }

    function loadUtterances() {
        const container = document.getElementById("utterances-container");
        if (!container || container.hasChildNodes()) return;

        const script = document.createElement("script");
        script.src = "https://utteranc.es/client.js";
        script.setAttribute("repo", "h4xk0r/h4xk0r.github.io"); 
        script.setAttribute("issue-term", "pathname");
        script.setAttribute("label", "comment");
        script.setAttribute("theme", getTargetTheme());
        script.setAttribute("crossorigin", "anonymous");
        script.async = true;

        container.appendChild(script);
    }

    function syncUtterancesTheme() {
        const iframe = document.querySelector("iframe.utterances-frame");
        if (iframe && iframe.contentWindow) {
            iframe.contentWindow.postMessage({
                type: 'set-theme',
                theme: getTargetTheme()
            }, 'https://utteranc.es');
        }
    }

    // 页面就绪加载
    if (document.readyState === "interactive" || document.readyState === "complete") {
        loadUtterances();
    } else {
        document.addEventListener("DOMContentLoaded", loadUtterances);
    }

    // 🚀 核心修复：布下天罗地网，同时监控 html 和 body 的 class 与 data-theme 属性
    const observer = new MutationObserver((mutations) => {
        for (const mutation of mutations) {
            if (mutation.attributeName === "class" || mutation.attributeName === "data-theme") {
                syncUtterancesTheme();
                break; // 触发一次更新即可
            }
        }
    });

    // 把 html 标签和 body 标签全盯死
    observer.observe(document.documentElement, { attributes: true, attributeFilter: ["class", "data-theme"] });
    observer.observe(document.body, { attributes: true, attributeFilter: ["class", "data-theme"] });
</script>
